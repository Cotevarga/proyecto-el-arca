services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elarca-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    networks:
      - elarca-network

volumes:
  uploads_data:
    driver: local

networks:
  elarca-network:
    driver: bridge
