name: CI — Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno-tests:
    name: Deno Edge Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache functions/_shared/cors.ts functions/_shared/supabase.ts functions/_shared/rateLimit.ts

      - name: Run tests
        run: deno test --allow-env --allow-net

  java-tests:
    name: Spring Boot Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn test --batch-mode
