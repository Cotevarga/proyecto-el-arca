[functions]

[functions.auth]
verify_jwt = false

[functions.galeria]
verify_jwt = true

[functions.musica]
verify_jwt = true

[functions.recuerdos]
verify_jwt = false

[functions.upload]
verify_jwt = false

[functions.search]
verify_jwt = false

[functions.stats]
verify_jwt = false

[functions.export]
verify_jwt = false

[functions.auditoria]
verify_jwt = true

[api]
enabled = true
# Producción: solo elarca.cl y vercel.app
extra_tags = ["security", "cors"]

[api.cors]
enabled = true
allowed_origins = ["https://elarca.cl", "https://www.elarca.cl", "https://proyecto-el-arca.vercel.app"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["authorization", "x-client-info", "apikey", "content-type"]
expose_headers = ["x-ratelimit-limit", "x-ratelimit-remaining"]
max_age = 3600