spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

elarca:
  jwt:
    secret: ${JWT_SECRET}
  storage:
    upload-dir: ${UPLOAD_DIR}

logging:
  level:
    com.elarca: WARN
  file:
    name: /var/log/elarca/application.log
