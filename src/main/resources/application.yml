server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: elarca
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/elarca}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB
      location: ${java.io.tmpdir}
  flyway:
    enabled: false  # Migraciones gestionadas desde Supabase (única fuente de verdad)
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600
        cachecontrol:
          max-age: 3600

elarca:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  storage:
    upload-dir: ${UPLOAD_DIR:/tmp/elarca-uploads}
    allowed-image-types: image/jpeg,image/png,image/webp,image/gif
    allowed-audio-types: audio/mpeg,audio/wav,audio/ogg,audio/mp4
    max-file-size: 52428800
  cors:
    # IMPORTANTE: En Render, setea CORS_ALLOWED_ORIGINS=https://proyecto-el-arca.vercel.app
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://proyecto-el-arca.vercel.app,http://localhost:5173,http://localhost:3000,http://localhost:8080}
  rate-limiting:
    enabled: true
    capacity: 20
    refill-tokens: 20
    refill-minutes: 15

logging:
  level:
    com.elarca: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha