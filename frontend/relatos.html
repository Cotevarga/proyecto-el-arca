<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatos — Memoria de El Arca</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <style>
    :root { --color-mir: #E50914; --color-noche: #111111; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; background-color: #000000 !important; color: #ffffff !important; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
    .animate-fade-in-up { animation: fadeInUp 0.8s ease-out forwards; }
    .card-mir { background-color: var(--color-noche) !important; border: 1px solid rgba(229,9,20,0.4) !important; padding: 1.5rem; }
    .heading-mir { font-family: Arial, Helvetica, sans-serif !important; color: white !important; text-transform: uppercase; letter-spacing: 0.05em; }
    .text-mir { color: var(--color-mir) !important; }
    .border-mir\/30 { border-color: rgba(229,9,20,0.3) !important; }
    .border-mir\/40 { border-color: rgba(229,9,20,0.4) !important; }
    .border-mir\/20 { border-color: rgba(229,9,20,0.2) !important; }
    .bg-mir { background-color: var(--color-mir) !important; }
    .font-title { font-family: Arial, Helvetica, sans-serif !important; letter-spacing: 0.05em; }
    .bg-noche { background-color: var(--color-noche) !important; }
    .hover\:text-mir:hover { color: var(--color-mir) !important; }
    .hover\:border-mir:hover { border-color: var(--color-mir) !important; }
    @keyframes tooltipPulse { 0%,100%{opacity:0.7;transform:translateX(0)} 50%{opacity:1;transform:translateX(4px)} }
    .cat-card { transition: all 0.4s ease; cursor: pointer; }
    .cat-card:hover { transform: translateY(-8px); border-color: var(--color-mir) !important; box-shadow: 0 10px 40px rgba(229,9,20,0.2); }
  <script src="/audio-player.js" defer></script>
</head>
<body class="bg-black text-white antialiased">

  <nav class="fixed top-0 left-0 w-full z-50 bg-black/90 backdrop-blur-md border-b border-mir/30">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="text-white font-bold text-2xl tracking-wide font-title">EL ARCA</a>
      <div class="hidden md:flex gap-6 text-sm font-semibold text-white/80">
        <a href="index.html" class="hover:text-mir transition border-b-2 border-transparent hover:border-mir pb-1">Inicio</a>
        <a href="galeria.html" class="hover:text-mir transition border-b-2 border-transparent hover:border-mir pb-1">Galería</a>
        <a href="videos.html" class="hover:text-mir transition border-b-2 border-transparent hover:border-mir pb-1">Videos</a>
        <a href="relatos.html" class="text-mir border-b-2 border-mir pb-1">Relatos</a>
        <a href="legado.html" class="hover:text-mir transition border-b-2 border-transparent hover:border-mir pb-1">El Legado</a>
        <a href="index.html#archivo" class="hover:text-mir transition border-b-2 border-transparent hover:border-mir pb-1">Archivo</a>
      </div>
      <button id="menu-toggle" class="md:hidden text-white p-2" aria-label="Abrir menú">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden bg-black/95 border-t border-mir/30 px-4 py-4">
      <div class="flex flex-col gap-3 text-sm font-semibold text-white/80">
        <a href="index.html" class="hover:text-mir transition">Inicio</a>
        <a href="galeria.html" class="hover:text-mir transition">Galería</a>
        <a href="videos.html" class="hover:text-mir transition">Videos</a>
        <a href="relatos.html" class="text-mir">Relatos</a>
        <a href="legado.html" class="hover:text-mir transition">El Legado</a>
        <a href="index.html#archivo" class="hover:text-mir transition">Archivo</a>
      </div>
    </div>
  </nav>

  <div id="page-content">
    <header class="pt-32 pb-16 bg-black text-center border-b border-mir/20">
      <div class="max-w-5xl mx-auto px-4 animate-fade-in-up">
        <span class="text-mir font-bold text-xs tracking-[0.3em] uppercase">Crónica Popular</span>
        <h1 class="heading-mir text-5xl md:text-7xl mt-4 mb-4">Relatos de El Arca</h1>
        <div class="divider-mir mx-auto"></div>
        <p class="text-white/60 text-lg max-w-2xl mx-auto">Explora las crónicas, entrevistas y testimonios que reconstruyen la historia del centro cultural y su fundador.</p>
      </div>
    </header>

    <section class="py-20 bg-noche">
      <div class="max-w-6xl mx-auto px-4">
        <div class="grid md:grid-cols-3 gap-8">

          <a href="relatos/jano.html" class="cat-card card-mir flex flex-col items-center text-center min-h-[320px] justify-center">
            <div class="text-6xl mb-6">🔥</div>
            <h2 class="text-mir font-title text-2xl uppercase mb-3">El Jano</h2>
            <p class="text-white/50 text-sm leading-relaxed">Historia personal, sueños y testimonios de Pedro Alejandro González Reyes, "El Cabezón Jano".</p>
            <span class="text-mir/60 text-xs mt-4 uppercase tracking-widest">Leer crónicas →</span>
          </a>

          <a href="relatos/arca.html" class="cat-card card-mir flex flex-col items-center text-center min-h-[320px] justify-center">
            <div class="text-6xl mb-6">🏛️</div>
            <h2 class="text-mir font-title text-2xl uppercase mb-3">El Arca</h2>
            <p class="text-white/50 text-sm leading-relaxed">Historia institucional, trabajo territorial, La Goya en las Calles y el legado que camina.</p>
            <span class="text-mir/60 text-xs mt-4 uppercase tracking-widest">Leer crónicas →</span>
          </a>

          <a href="relatos/organizaciones.html" class="cat-card card-mir flex flex-col items-center text-center min-h-[320px] justify-center">
            <div class="text-6xl mb-6">✊</div>
            <h2 class="text-mir font-title text-2xl uppercase mb-3">Otras Organizaciones</h2>
            <p class="text-white/50 text-sm leading-relaxed">Memorias de organización social: La Caleta y Antupeñi.</p>
            <span class="text-mir/60 text-xs mt-4 uppercase tracking-widest">Explorar →</span>
          </a>

        </div>
      </div>
    </section>

    <section class="py-16 bg-black border-t border-mir/20 text-center">
      <div class="max-w-3xl mx-auto px-4">
        <h2 class="heading-mir text-4xl md:text-5xl mb-4">Tu relato también importa</h2>
        <div class="divider-mir mx-auto"></div>
        <p class="text-white/60 text-lg mb-8">Si fuiste parte de El Arca, si conociste al Jano, si creciste en La Goya: tu memoria es parte de esta historia.</p>
        <a href="index.html#archivo" class="inline-block bg-mir hover:bg-resistencia-700 text-white font-bold py-3 px-10 transition-all duration-300 tracking-wider uppercase text-sm border-2 border-mir hover:bg-black hover:text-mir">Comparte tu recuerdo</a>
      </div>
    </section>
  </div>

  <footer class="bg-black text-white/50 py-12 border-t border-mir/20">
    <div class="max-w-5xl mx-auto px-4 text-center">
      <a href="index.html" class="text-mir font-title text-3xl font-bold mb-4 block tracking-wide">EL ARCA</a>
      <p class="text-sm max-w-md mx-auto mb-6 text-white/40">Memoria Viva de la Población Francisco de Goya, La Pintana.</p>
      <div class="border-t border-white/10 pt-6 text-xs text-white/30">&copy; 2026 — Memoria Popular El Arca.</div>
    </div>
  </footer>

  <style>
    .divider-mir { width: 4rem; height: 0.25rem; background-color: var(--color-mir) !important; margin-top: 1.5rem; margin-bottom: 1.5rem; margin-left: auto; margin-right: auto; }
    .hover\:bg-resistencia-700:hover { background-color: #b91c1c !important; }
  </style>


  <script>
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    });
    document.querySelectorAll('#mobile-menu a').forEach(function(l) {
      l.addEventListener('click', function() { document.getElementById('mobile-menu').classList.add('hidden'); });
    });
  </script>
</body>
</html>
